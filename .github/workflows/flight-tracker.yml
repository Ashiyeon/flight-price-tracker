name: Flight Price Tracker Automation

on:
  schedule:
    # 每天早上 8 點與晚上 8 點各跑一次 (台灣時間 = UTC 0 點與 12 點)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行測試

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Action 將更新的歷史資料 Commit 回去

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run flight tracker
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      - name: Commit and Push history data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Tracker"
          git add data/price_history.json
          # 檢查如果檔案有變更才進行 Commit，避免報錯
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update price history [skip ci]" && git push)
